name: USKids Field Monitor
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    name: ⛳ Descoberta + Inscritos
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with: { token: '${{ secrets.GITHUB_TOKEN }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: node scripts/fetch-uskids-field.js
      - name: Commit se houve alterações
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/uskids-field.json public/data/uskids-discovery-cache.json
          git diff --cached --quiet && exit 0
          git commit -m "data: USKids field [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git fetch origin main
          git reset --soft HEAD~1
          git stash
          git rebase origin/main
          git stash pop
          git add public/data/uskids-field.json public/data/uskids-discovery-cache.json
          git commit -m "data: USKids field [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
